<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebCitas — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="centered">
    <div class="card" id="authCard">
      <h1>CITAS DE PELUQUERIA</h1>
      <p>INICIA SESION</p>
      <form class="authForm" method="post" action="php/login.php">
        <label>Nombre de usuario
          <input name="usuario" required placeholder="Ej. Juan Pérez" />
        </label>

        <label>Contraseña
          <input name="contraseña" type="password" required placeholder="Contraseña" />
        </label>

        <div class="actions">
          <button class="btn primary" type="submit">Continuar</button>
        </div>
      </form>
      <p id="loginError" class="muted"></p>
      <p class="muted">
        ¿No tienes cuenta?
        <a href="register.html" style="color:#7c3aed;font-weight:600;">Regístrate aquí</a>
      </p>
    </div>
  </main>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      if (error) {
        const p = document.getElementById('loginError');
        if (p) p.textContent = error;
        // Opcional: limpiar el parámetro de la URL para que no se repita al refrescar
        if (window.history && window.history.replaceState) {
          const url = window.location.origin + window.location.pathname;
          window.history.replaceState({}, '', url);
        }
      }
    })();
  </script>
</body>
</html>
