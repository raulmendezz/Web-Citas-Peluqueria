<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebCitas — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="centered">
    <div class="card">
      <h1>Registro</h1>
      <p class="muted">Crea tu usuario (siempre usuario normal)</p>
      <form class="authForm" method="post" action="php/register.php">
        <label>Nombre y apellidos
          <input name="usuario" required placeholder="Ej. Juan Pérez" />
        </label>
        <label>Contraseña
          <input name="contraseña" type="password" required placeholder="Contraseña" />
        </label>
        <div class="actions">
          <button class="btn primary" type="submit">Registrar</button>
        </div>
      </form>
      <p class="muted">
        ¿Ya tienes cuenta?
        <a href="index.html" style="color:#7c3aed;font-weight:600;">Inicia sesión</a>
      </p>
    </div>
  </main>
</body>
</html>
